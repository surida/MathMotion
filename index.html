<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathMotion — 움직임으로 배우는 중학 수학</title>
<meta name="description" content="웹툰과 인터랙티브 실험으로 원리를 이해하는 중학교 수학 학습 사이트">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3E2;--paper-2:#F4E7CC;
    --ink:#2B2520;--ink-soft:#5A5046;
    --g2:#7CC36A;--g3:#E8884E;
    --sun:#FFC847;--red:#E8584E;--mint:#39C2C9;
    --gator:#7CC36A;--gator-d:#4E9E48;--gator-belly:#E9F5C9;
    --shadow:6px 6px 0 var(--ink);
    --display:'Jua',sans-serif;--hand:'Gaegu',cursive;--body:'Gowun Dodum',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);
    background-image:radial-gradient(var(--paper-2) 1.3px,transparent 1.4px);background-size:14px 14px;line-height:1.7;padding-bottom:50px}
  .wrap{max-width:980px;margin:0 auto;padding:0 18px}
  a{color:inherit;text-decoration:none}
  [hidden]{display:none!important}
  .gator .teeth{fill:#fff}.gator .mouth{fill:#9B3B3B}.gator .eyew{fill:#fff}.gator .pupil{fill:var(--ink)}
  .gator .body{fill:var(--gator)}.gator .bodyd{fill:var(--gator-d)}.gator .belly{fill:var(--gator-belly)}

  /* ---------- LANDING ---------- */
  #landing{text-align:center;padding:46px 18px 60px;position:relative;min-height:90vh}
  #landing .sky{position:absolute;inset:0;background:radial-gradient(120% 70% at 50% 0%,#FFE9B0 0%,transparent 60%);z-index:-1}
  .brand{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .brand .logo{width:84px}
  .logo .gator{animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
  #landing h1{font-family:var(--display);font-size:clamp(40px,9vw,72px);line-height:1;text-shadow:4px 4px 0 var(--sun)}
  #landing h1 .m{color:var(--gator-d)}
  #landing .slogan{font-family:var(--hand);font-size:22px;color:var(--ink-soft);font-weight:700;margin-top:6px}

  .pick{margin-top:40px}
  .pick .q{font-family:var(--display);font-size:24px;margin-bottom:16px}
  .pick .q small{display:block;font-family:var(--hand);font-size:16px;color:var(--ink-soft);font-weight:700;margin-top:2px}
  .gradebtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .gradebtn{font-family:var(--display);font-size:30px;color:#fff;border:4px solid var(--ink);border-radius:20px;
    padding:24px 40px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s}
  .gradebtn:hover{transform:translate(-2px,-2px)}
  .gradebtn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink)}
  .gradebtn.g2{background:var(--g2)}.gradebtn.g3{background:var(--g3)}
  .gradebtn.sel{outline:5px solid var(--sun);outline-offset:3px}

  .pubpick{margin-top:40px}
  .pubbtns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .pubbtn{font-family:var(--display);font-size:22px;background:#fff;border:4px solid var(--ink);border-radius:16px;
    padding:16px 28px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s}
  .pubbtn:hover{transform:translate(-2px,-2px);background:var(--paper-2)}
  .pubbtn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink)}
  .pubbtn .badge{display:block;font-family:var(--body);font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:4px}

  /* ---------- MENU ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(251,243,226,.94);backdrop-filter:blur(6px);
    border-bottom:3px solid var(--ink);padding:10px 0}
  .topbar .inner{max-width:980px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .topbar .home{display:flex;align-items:center;gap:8px;font-family:var(--display);font-size:20px}
  .topbar .home .tg{width:34px}
  .topbar .home .m{color:var(--gator-d)}
  .switch{margin-left:auto;display:flex;gap:8px}
  .chip{font-family:var(--display);font-size:16px;border:3px solid var(--ink);background:#fff;border-radius:999px;
    padding:6px 16px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:transform .12s}
  .chip:hover{transform:translate(-1px,-1px)}
  .chip:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .chip.g2{background:#EAF7E6}.chip.g3{background:#FDEEE3}

  .menu-head{text-align:center;margin:30px 0 8px}
  .menu-head h2{font-family:var(--display);font-size:clamp(26px,5.5vw,38px)}
  .menu-head .stat{display:inline-block;margin-top:10px;background:var(--ink);color:var(--paper);font-family:var(--display);
    padding:6px 18px;border-radius:999px;font-size:14px;transform:rotate(-1deg)}
  .menu-head .stat b{color:var(--sun)}

  .units{display:grid;gap:16px;grid-template-columns:1fr;margin-top:24px}
  @media(min-width:640px){.units{grid-template-columns:1fr 1fr}}
  .unit{background:#fff;border:3px solid var(--ink);border-radius:16px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:12px}
  .unit-top{display:flex;align-items:center;gap:10px}
  .unum{font-family:var(--display);width:34px;height:34px;flex:none;display:grid;place-items:center;border-radius:10px;color:#fff;font-size:16px;border:2.5px solid var(--ink)}
  .g2 .unum,.unit.g2 .unum{background:var(--g2)}.g3 .unum,.unit.g3 .unum{background:var(--g3)}
  .uname{font-family:var(--display);font-size:19px}
  .badge-ready{margin-left:auto;font-family:var(--display);font-size:12px;background:var(--sun);border:2px solid var(--ink);border-radius:999px;padding:2px 10px}
  .lessons{display:flex;flex-direction:column;gap:10px}
  .lesson{display:flex;align-items:center;gap:12px;border:3px solid var(--ink);border-radius:13px;padding:11px 13px;
    background:linear-gradient(180deg,#FFFDF6,#FFF4DE);transition:transform .14s, box-shadow .14s;box-shadow:3px 3px 0 var(--ink)}
  .lesson:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
  .lesson .emoji{font-size:30px;flex:none}
  .lesson .meta{flex:1;min-width:0}
  .lesson .t{font-family:var(--display);font-size:17px;line-height:1.2}
  .lesson .d{font-size:13px;color:var(--ink-soft)}
  .lesson .go{font-family:var(--display);font-size:14px;color:var(--gator-d);white-space:nowrap}
  .soon{display:flex;align-items:center;gap:10px;border:3px dashed #C9BCA4;border-radius:13px;padding:12px 14px;color:#A99B82;font-family:var(--display);font-size:15px;background:repeating-linear-gradient(45deg,#fff,#fff 8px,#FBF3E2 8px,#FBF3E2 16px)}

  footer{text-align:center;margin-top:56px;color:var(--ink-soft);font-family:var(--hand);font-size:18px}
</style>
</head>
<body>

<!-- ============ LANDING ============ -->
<section id="landing">
  <div class="sky"></div>
  <div class="wrap">
    <div class="brand">
      <div class="logo" id="logo"></div>
      <h1>Math<span class="m">Motion</span></h1>
    </div>
    <div class="slogan">움직임으로 배우는 중학 수학 🐊</div>

    <div class="pick">
      <div class="q">먼저, 몇 학년이야?<small>학년을 골라줘</small></div>
      <div class="gradebtns" id="gradeBtns"></div>
    </div>

    <div class="pubpick" id="pubPick" hidden>
      <div class="q">어떤 교과서로 배워?<small id="pubGradeLbl"></small></div>
      <div class="pubbtns" id="pubBtns"></div>
    </div>
  </div>
</section>

<!-- ============ MENU ============ -->
<section id="menu" hidden>
  <div class="topbar">
    <div class="inner">
      <a class="home" href="#" id="homeBtn"><span class="tg" id="topGator"></span> <span>Math<span class="m">Motion</span></span></a>
      <div class="switch">
        <button class="chip" id="gradeChip">중2 ▾</button>
        <button class="chip" id="pubChip">교학사 ▾</button>
      </div>
    </div>
  </div>
  <div class="wrap">
    <div class="menu-head">
      <h2 id="menuTitle">중2 · 교학사</h2>
      <div class="stat" id="stat"></div>
    </div>
    <div class="units" id="units"></div>
  </div>
  <footer>외우지 말고 <b>원리</b>로! 계속 새로운 레슨이 추가됩니다 ✏️</footer>
</section>

<script>
/* ---------- 레슨 풀 (개념 단위, 교과서 공유) ---------- */
const LESSONS = {
  'repeating-decimal':{emoji:'🔁', title:'분수는 왜 끝없이 반복될까?', desc:'부등이의 나눗셈 회전판 — 순환소수의 비밀', href:'lessons/repeating-decimal.html'},
  'ineq-mirror':      {emoji:'🐊', title:'부등호가 뒤집히는 진짜 이유', desc:'부등이의 거울 동굴 — 웹툰 + 거울 실험실', href:'lessons/ineq-mirror.html'},
  'linear-stairs':    {emoji:'🪜', title:'y = ax + b 의 비밀', desc:'부등이의 계단 오르기 — a(기울기)와 b(절편)', href:'lessons/linear-stairs.html'},
  'linear-equation':  {emoji:'🎯', title:'방정식 ax + b = 0 의 해', desc:'부등이, 땅에 닿다 — 해 = 그래프가 x축과 만나는 점', href:'lessons/linear-equation.html'},
  'exponent-laws':    {emoji:'🧱', title:'지수는 곱한 횟수다', desc:'부등이의 a 블록 공장 — 곱셈은 더하고, 거듭제곱은 곱한다', href:'lessons/exponent-laws.html'},
  'exponent-division':{emoji:'✂️', title:'지수의 나눗셈 — 약분의 비밀', desc:'부등이의 a 약분소 — 짝 지우면 지수가 빠진다', href:'lessons/exponent-division.html'},
  'simultaneous-eq':  {emoji:'🧾', title:'연립방정식 — 빼서 푸는 비밀', desc:'부등이의 영수증 탐정 — 가감법으로 미지수 소거', href:'lessons/simultaneous-equations.html'},
  'square-root':      {emoji:'🟦', title:'제곱근 — 넓이에서 한 변 찾기', desc:'부등이의 정사각형 — √a는 넓이 a 정사각형의 한 변(제곱의 반대)', href:'lessons/square-root.html'},
  'sqrt-mul-div':     {emoji:'√', title:'제곱근의 곱셈과 나눗셈', desc:'부등이의 근호 합치기 — 근호 안 수끼리 곱하고 나눈다(√a√b=√ab)', href:'lessons/sqrt-mul-div.html'},
  'sqrt-add-sub':     {emoji:'➕', title:'제곱근의 덧셈과 뺄셈', desc:'부등이의 근호 모으기 — 같은 근호끼리 계수를 더한다(√a+√b≠√(a+b))', href:'lessons/sqrt-add-sub.html'},
  'factoring':        {emoji:'🧩', title:'인수분해 — 직사각형 맞추기', desc:'부등이의 직사각형 — 대수막대로 x²+(a+b)x+ab=(x+a)(x+b)', href:'lessons/factoring.html'},
  'factoring-neg':    {emoji:'🕵️', title:'인수분해 — 음수와 부호', desc:'부등이의 부호 탐정 — 곱·합으로 음수 두 수 찾기(부호 규칙)', href:'lessons/factoring-negative.html'},
  'quadratic-eq':     {emoji:'🔑', title:'이차방정식 — 0의 비밀(AB=0)', desc:'부등이의 0의 비밀 — 곱이 0이면 하나가 0 → 인수분해로 두 근', href:'lessons/quadratic-eq.html'},
  'quadratic-formula':{emoji:'🗝️', title:'근의 공식 — 인수분해 안 될 때', desc:'부등이의 만능 열쇠 — 판별식·포물선으로 근의 공식', href:'lessons/quadratic-formula.html'},
  'quadratic-function':{emoji:'🏭', title:'이차함수 y=ax² 그래프', desc:'부등이의 포물선 공장 — a 하나로 방향(∪/∩)·폭이 정해진다 + 생활 속 포물선(농구·분수·다리)', href:'lessons/quadratic-function.html'},
  'quadratic-shift':  {emoji:'🏠', title:'이차함수 y=a(x−p)²+q', desc:'부등이의 포물선 이사 — p·q로 꼭짓점을 (p,q)로 옮기기(x−p는 오른쪽 함정)', href:'lessons/quadratic-shift.html'},
  'quadratic-standard':{emoji:'🪄', title:'이차함수 y=ax²+bx+c', desc:'부등이의 포물선 변신술 — 완전제곱으로 표준형 변신 후 숨은 꼭짓점 꺼내기', href:'lessons/quadratic-standard.html'},
};

/* ---------- 교육과정: 학년 → 교과서 → 단원(순서) → 레슨 id ---------- */
const CURRICULUM = {
  '중2': {
    '교학사': [
      {n:1, name:'수와 식',          lessons:['repeating-decimal','exponent-laws','exponent-division']},
      {n:2, name:'부등식과 방정식',   lessons:['ineq-mirror','simultaneous-eq']},
      {n:3, name:'일차함수',          lessons:['linear-stairs','linear-equation']},
      {n:4, name:'도형의 성질',       lessons:[]},
      {n:5, name:'도형의 닮음',       lessons:[]},
      {n:6, name:'확률',             lessons:[]},
    ],
    '천재교육': [
      {n:1, name:'유리수와 순환소수',          lessons:['repeating-decimal']},
      {n:2, name:'식의 계산',                 lessons:['exponent-laws','exponent-division']},
      {n:3, name:'일차부등식과 연립일차방정식', lessons:['ineq-mirror','simultaneous-eq']},
      {n:4, name:'일차함수와 그래프',          lessons:['linear-stairs','linear-equation']},
      {n:5, name:'삼각형과 사각형의 성질',      lessons:[]},
      {n:6, name:'도형의 닮음과 피타고라스 정리', lessons:[]},
      {n:7, name:'확률',                      lessons:[]},
    ],
  },
  '중3': {
    '동아출판사': [
      {n:1, name:'실수와 그 계산',            lessons:['square-root','sqrt-mul-div','sqrt-add-sub']},
      {n:2, name:'다항식의 곱셈과 인수분해',   lessons:['factoring','factoring-neg']},
      {n:3, name:'이차방정식',               lessons:['quadratic-eq','quadratic-formula']},
      {n:4, name:'이차함수와 그래프',         lessons:['quadratic-function','quadratic-shift','quadratic-standard']},
      {n:5, name:'삼각비',                   lessons:[]},
      {n:6, name:'원의 성질',                lessons:[]},
      {n:7, name:'통계',                     lessons:[]},
    ],
    '천재교육': [
      {n:1, name:'제곱근과 실수',            lessons:['square-root']},
      {n:2, name:'근호를 포함한 식의 계산',   lessons:['sqrt-mul-div','sqrt-add-sub']},
      {n:3, name:'다항식의 곱셈과 인수분해',  lessons:['factoring','factoring-neg']},
      {n:4, name:'이차방정식',               lessons:['quadratic-eq','quadratic-formula']},
      {n:5, name:'이차함수와 그래프',         lessons:['quadratic-function','quadratic-shift','quadratic-standard']},
      {n:6, name:'삼각비',                   lessons:[]},
      {n:7, name:'원의 성질',                lessons:[]},
      {n:8, name:'대푯값과 산포도',           lessons:[]},
      {n:9, name:'상관관계',                 lessons:[]},
    ],
  },
};
const GRADE_CLS = {'중2':'g2','중3':'g3'};
const KEY_G='mm-grade', KEY_P='mm-pub';

function gatorSVG(){
  return `<svg class="gator" viewBox="0 0 130 100" xmlns="http://www.w3.org/2000/svg">
    <path class="bodyd" d="M14 58 q-12 4 -8 16 q10 -2 16 -8 z"/><ellipse class="bodyd" cx="40" cy="78" rx="9" ry="7"/>
    <path class="body" d="M52 50 Q30 18 16 36 Q6 52 22 64 Q34 74 56 64 Z"/><ellipse class="belly" cx="34" cy="60" rx="14" ry="9"/>
    <path class="mouth" d="M52 51 L122 22 L122 80 Z"/>
    <path class="bodyd" d="M50 44 L120 18 Q128 18 126 28 L56 52 Z"/><path class="body" d="M52 58 L120 84 Q128 84 126 74 L58 54 Z"/>
    <path class="teeth" d="M64 48 l5 7 l5 -9 l5 7 l5 -9 l5 7 l5 -9 l5 7 l5 -9 l4 6 l3 -7 l-52 19 z"/>
    <path class="teeth" d="M66 53 l4 -6 l5 8 l5 -6 l5 8 l5 -6 l5 8 l5 -6 l5 8 l4 -5 l3 6 l-55 -1 z" opacity=".95"/>
    <circle class="body" cx="30" cy="30" r="11"/><circle class="eyew" cx="31" cy="29" r="7"/>
    <circle class="pupil" cx="33" cy="30" r="3.6"/><circle class="eyew" cx="34.4" cy="28.6" r="1.2"/>
    <circle class="pupil" cx="22" cy="44" r="2"/><circle cx="26" cy="50" r="4" fill="#ff9aa0" opacity=".55"/>
  </svg>`;
}
const esc=s=>(''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const landingEl=document.getElementById('landing'), menuEl=document.getElementById('menu');
const gradeBtns=document.getElementById('gradeBtns'), pubPick=document.getElementById('pubPick');
const pubBtns=document.getElementById('pubBtns'), pubGradeLbl=document.getElementById('pubGradeLbl');
let selGrade=null;

document.getElementById('logo').innerHTML=gatorSVG();
document.getElementById('topGator').innerHTML=gatorSVG();

/* ----- LANDING ----- */
function renderGrades(){
  gradeBtns.innerHTML=Object.keys(CURRICULUM).map(g=>
    `<button class="gradebtn ${GRADE_CLS[g]} ${g===selGrade?'sel':''}" data-g="${g}">${g}</button>`).join('');
}
function renderPubs(){
  if(!selGrade){pubPick.hidden=true;return;}
  pubPick.hidden=false;
  pubGradeLbl.textContent=`${selGrade} 교과서를 골라줘`;
  pubBtns.innerHTML=Object.keys(CURRICULUM[selGrade]).map(p=>{
    const cnt=CURRICULUM[selGrade][p].reduce((s,u)=>s+u.lessons.length,0);
    return `<button class="pubbtn" data-p="${esc(p)}">${esc(p)}<span class="badge">${cnt>0?cnt+'개 레슨 공개':'준비 중'}</span></button>`;
  }).join('');
}
function showLanding(prefillGrade){
  menuEl.hidden=true; landingEl.hidden=false;
  selGrade=prefillGrade&&CURRICULUM[prefillGrade]?prefillGrade:null;
  renderGrades(); renderPubs();
  window.scrollTo(0,0);
}
gradeBtns.addEventListener('click',e=>{const b=e.target.closest('.gradebtn');if(!b)return;
  selGrade=b.dataset.g; renderGrades(); renderPubs();
  pubPick.scrollIntoView({behavior:'smooth',block:'center'});});
pubBtns.addEventListener('click',e=>{const b=e.target.closest('.pubbtn');if(!b)return;choose(selGrade,b.dataset.p);});

function choose(g,p){localStorage.setItem(KEY_G,g);localStorage.setItem(KEY_P,p);showMenu(g,p);}

/* ----- MENU ----- */
function renderUnits(g,p){
  const cls=GRADE_CLS[g]; let total=0;
  const html=CURRICULUM[g][p].map(u=>{
    const ls=u.lessons.map(id=>LESSONS[id]).filter(Boolean); total+=ls.length;
    const inner=ls.length
      ? `<div class="lessons">`+ls.map(l=>
          `<a class="lesson" href="${l.href}"><span class="emoji">${l.emoji}</span><span class="meta"><span class="t">${esc(l.title)}</span><span class="d">${esc(l.desc)}</span></span><span class="go">▶ 시작</span></a>`).join('')+`</div>`
      : `<div class="soon">🔒 준비 중이에요</div>`;
    return `<div class="unit ${cls}"><div class="unit-top"><span class="unum">${u.n}</span><span class="uname">${esc(u.name)}</span>${ls.length?`<span class="badge-ready">${ls.length}개 공개</span>`:''}</div>${inner}</div>`;
  }).join('');
  document.getElementById('units').innerHTML=html;
  document.getElementById('stat').innerHTML=`${g} · ${esc(p)} · 현재 <b>${total}개</b> 레슨 공개`;
  document.getElementById('menuTitle').textContent=`${g} · ${p}`;
}
function showMenu(g,p){
  landingEl.hidden=true; menuEl.hidden=false;
  document.getElementById('gradeChip').textContent=g+' ▾';
  document.getElementById('pubChip').textContent=p+' ▾';
  const chipG=document.getElementById('gradeChip');
  chipG.className='chip '+GRADE_CLS[g];
  renderUnits(g,p);
  window.scrollTo(0,0);
}
document.getElementById('gradeChip').addEventListener('click',()=>showLanding(localStorage.getItem(KEY_G)));
document.getElementById('pubChip').addEventListener('click',()=>showLanding(localStorage.getItem(KEY_G)));
document.getElementById('homeBtn').addEventListener('click',e=>{e.preventDefault();showLanding(localStorage.getItem(KEY_G));});

/* ----- INIT ----- */
(function(){
  const g=localStorage.getItem(KEY_G), p=localStorage.getItem(KEY_P);
  if(g&&p&&CURRICULUM[g]&&CURRICULUM[g][p]) showMenu(g,p);
  else showLanding(g);
})();
</script>
</body>
</html>
